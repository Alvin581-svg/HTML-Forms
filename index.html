<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Job Application Form</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background-color:#f5f5f5;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    margin-top:40px;
}

fieldset{
    border:2px solid #007bff;
    padding:20px;
    margin-bottom:20px;
    background:white;
}

legend{
    font-weight:bold;
    color:#007bff;
}

textarea{
    resize:none;
}

</style>

<script>
function validateForm() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let phone = document.getElementById("phone").value;

    if (name == "") {
        alert("Full Name must be filled out");
        return false;
    }

    if (email == "") {
        alert("Email Address must be filled out");
        return false;
    }

    if (phone == "") {
        alert("Telephone Number must be filled out");
        return false;
    }

    return true;
}
</script>

</head>

<body>

<div class="container">

<h2 class="text-center mb-4">Job Application Form</h2>

<form onsubmit="return validateForm()">

<!-- Personal Information -->
<fieldset>

<legend>Personal Information</legend>

<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" id="fullname" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Email Address</label>
<input type="email" id="email" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Telephone Number</label>
<input type="text" id="telephone" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Physical Address</label>
<input type="text" class="form-control">
</div>

</fieldset>

<!-- Position Information -->
<fieldset>

<legend>Position Information</legend>

<div class="mb-3">
<label class="form-label">Desired Job Title</label>
<select class="form-control">
<option>Software Developer</option>
<option>System Administrator</option>
<option>Network Engineer</option>
<option>IT Support Specialist</option>
</select>
</div>

<label class="form-label">Employment Type</label>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment">
<label class="form-check-label">Part-time Contract</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment">
<label class="form-check-label">Part-time Permanent</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment">
<label class="form-check-label">Full-time Contract</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment">
<label class="form-check-label">Full-time Permanent</label>
</div>

</fieldset>

<!-- Areas of Interest -->
<fieldset>

<legend>Areas of Interest</legend>

<div class="form-check">
<input class="form-check-input" type="checkbox" name="interest">
<label class="form-check-label">Account Executive</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" name="interest">
<label class="form-check-label">Business Development</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" name="interest">
<label class="form-check-label">Inside Sales</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" name="interest">
<label class="form-check-label">Sales Manager</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" name="interest">
<label class="form-check-label">VP Sales</label>
</div>

</fieldset>

<!-- Relocation -->
<fieldset>

<legend>Relocation</legend>

<div class="form-check">
<input class="form-check-input" type="radio" name="relocate">
<label class="form-check-label">Yes</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="relocate">
<label class="form-check-label">No</label>
</div>

</fieldset>

<!-- Message -->
<fieldset>

<legend>Additional Message</legend>

<textarea class="form-control" rows="4"
placeholder="Why are you suitable for this position?"></textarea>

</fieldset>

<!-- Buttons -->
<div class="text-center mb-5">

<button type="submit" class="btn btn-primary">Submit</button>

<button type="reset" class="btn btn-secondary">Reset</button>

</div>

</form>

</div>

</body>
</html>
