```html
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Job Application Form</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:Arial, Helvetica, sans-serif;
}

.container{
max-width:800px;
margin-top:40px;
}

fieldset{
border:2px solid #0d6efd;
padding:20px;
margin-bottom:25px;
background:white;
border-radius:8px;
}

legend{
font-weight:bold;
color:#0d6efd;
padding:0 10px;
}

textarea{
resize:none;
}

h2{
font-weight:bold;
}

</style>

<script>

function validateForm(){

let name = document.getElementById("fullname").value.trim();
let email = document.getElementById("email").value.trim();
let phone = document.getElementById("telephone").value.trim();

let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
let phonePattern = /^[0-9]{7,15}$/;

if(name === ""){
alert("Please enter your Full Name");
return false;
}

if(!emailPattern.test(email)){
alert("Please enter a valid Email Address");
return false;
}

if(!phonePattern.test(phone)){
alert("Telephone number must contain only numbers (7–15 digits)");
return false;
}

alert("Application submitted successfully!");
return true;

}

</script>

</head>

<body>

<div class="container">

<h2 class="text-center mb-4">Job Application Form</h2>

<form action="#" onsubmit="return validateForm()">

<!-- Personal Information -->
<fieldset>

<legend>Personal Information</legend>

<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" id="fullname" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Email Address</label>
<input type="email" id="email" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Telephone Number</label>
<input type="text" id="telephone" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Physical Address</label>
<input type="text" class="form-control">
</div>

</fieldset>


<!-- Position Information -->
<fieldset>

<legend>Position Information</legend>

<div class="mb-3">
<label class="form-label">Desired Job Title</label>
<select class="form-select">
<option>Software Developer</option>
<option>System Administrator</option>
<option>Network Engineer</option>
<option>IT Support Specialist</option>
</select>
</div>

<label class="form-label">Employment Type</label>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment">
<label class="form-check-label">Part-time Contract</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment">
<label class="form-check-label">Part-time Permanent</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment">
<label class="form-check-label">Full-time Contract</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment">
<label class="form-check-label">Full-time Permanent</label>
</div>

</fieldset>


<!-- Areas of Interest -->
<fieldset>

<legend>Areas of Interest</legend>

<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">Account Executive</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">Business Development</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">Inside Sales</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">Sales Manager</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">VP Sales</label>
</div>

</fieldset>


<!-- Relocation -->
<fieldset>

<legend>Relocation</legend>

<div class="form-check">
<input class="form-check-input" type="radio" name="relocate">
<label class="form-check-label">Yes</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="relocate">
<label class="form-check-label">No</label>
</div>

</fieldset>


<!-- Message -->
<fieldset>

<legend>Additional Message</legend>

<textarea class="form-control" rows="4" placeholder="Why are you suitable for this position?"></textarea>

</fieldset>


<!-- Buttons -->
<div class="text-center mb-5">

<button type="submit" class="btn btn-primary me-2">Submit</button>
<button type="reset" class="btn btn-secondary">Reset</button>

</div>

</form>

</div>

</body>
</html>
```
